validate_and_optimize_content_task:
  description: >
    Analyze the post draft:
    Input Media: {media_path}
    Input Caption: {caption}
    Input Hashtags: {hashtags}

    Perform the following:
    1. Validate media extension.
    2. Check that caption length is within limits.
    3. Check that hashtags are valid.
    4. Rewrite/optimize the caption to make it more engaging.
    5. Generate a collection of trending hashtags.
  expected_output: >
    A text response containing:
    - Validation Status (PASSED/FAILED)
    - Optimized Caption
  agent: content_optimizer

publish_content_task:
  description: >
    Publish the validated and optimized post to the verified accounts.
    Media Location: {media_path}
    Target Account: {account_info}

    For each target account:
    1. Validate token starts with EAA, is not expired, and contains permissions.
    2. Invoke the InstagramPublishTool to create a container and publish.
    3. If it fails, retry up to 3 times.
  expected_output: >
    A structured report summarizing publishing results for the account.
  agent: instagram_publisher

monitor_and_log_task:
  description: >
    Collect publication reports and:
    1. Record a detailed log for each account in the database using the AuditLoggerTool.
    2. Write a main audit log stating the publishing completion status and success rate.
  expected_output: >
    A final markdown execution summary containing audit records and performance analytics.
  agent: operations_auditor

notify_completion_task:
  description: >
    Send notifications regarding the publishing job completion.
    Notify the frontend and send an email alert summarizing the publication outcome.
  expected_output: >
    A status update indicating notifications have been successfully sent.
  agent: notification_agent
